name: Android APK Build

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Clear Gradle cache (important)
        run: |
          rm -rf ~/.gradle/caches
          rm -rf ~/.gradle/wrapper

      - name: Install dependencies
        run: npm install

      - name: Fix Hermes permissions
        run: |
          find node_modules/react-native/sdks -type f -name "hermesc" | xargs chmod +x 2>/dev/null || true
          find node_modules/react-native/sdks -type f -name "*.sh" | xargs chmod +x 2>/dev/null || true

      - name: Expo Prebuild
        run: npx expo prebuild --platform android --clean
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Release APK
        working-directory: android
        run: |
          ./gradlew assembleRelease \
            --no-daemon \
            --warning-mode none \
            -Dorg.gradle.jvmargs="-Xmx3g -XX:MaxMetaspaceSize=512m" \
            -Dorg.gradle.parallel=false
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"
          NODE_ENV: "production"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error