name: Android APK Build

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Install Expo CLI globally
        run: |
          npm install -g @expo/cli@latest
          EXPO_PATH=$(npm root -g)/@expo/cli/bin/cli
          echo "EXPO_CLI=$EXPO_PATH" >> $GITHUB_ENV
          ls -la $EXPO_PATH || echo "not found at $EXPO_PATH"
          which expo || echo "expo not in PATH"
          ls $(npm bin -g) | grep expo || echo "no expo in global bin"

      - name: Expo Prebuild
        run: |
          GLOBAL_BIN=$(npm bin -g)
          chmod +x $GLOBAL_BIN/expo || true
          $GLOBAL_BIN/expo prebuild --platform android --clean --no-install
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Patch Kotlin version to 2.0.21
        run: |
          KOTLIN_LINE=$(grep -n "kotlinVersion" android/build.gradle | head -1)
          echo "Found: $KOTLIN_LINE"
          sed -i 's/kotlinVersion = "[0-9.]*"/kotlinVersion = "2.0.21"/' android/build.gradle
          grep "kotlinVersion" android/build.gradle

      - name: Patch Gradle wrapper to 8.10.2
        run: |
          sed -i 's|gradle-[0-9.]*-bin.zip|gradle-8.10.2-bin.zip|g' android/gradle/wrapper/gradle-wrapper.properties
          cat android/gradle/wrapper/gradle-wrapper.properties

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Release APK
        working-directory: android
        run: |
          ./gradlew assembleRelease \
            --no-daemon \
            --warning-mode none \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m" \
            -Dorg.gradle.parallel=false
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn
