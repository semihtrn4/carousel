name: Android APK Build

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Fix Hermes hermesc permissions
        run: |
          echo "=== Fixing Hermes binary permissions ==="
          find node_modules/react-native/sdks -type f -name "hermesc" | xargs chmod +x 2>/dev/null || true
          find node_modules/react-native/sdks -type f -name "*.sh" | xargs chmod +x 2>/dev/null || true
          find node_modules/react-native/sdks -type f -name "hbc-*" | xargs chmod +x 2>/dev/null || true
          echo "=== Hermes binary check ==="
          ls -la node_modules/react-native/sdks/hermesc/linux64-bin/ || echo "hermesc dir not found"

      - name: Expo Prebuild
        run: node node_modules/expo/bin/cli prebuild --platform android --clean --no-install
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Patch Kotlin version to 2.0.21
        run: |
          echo "=== Searching for kotlin in build.gradle ==="
          grep -n "kotlin" android/build.gradle || true
          grep -n "kotlin" android/gradle.properties || true
          sed -i 's/kotlinVersion = "[0-9.]*"/kotlinVersion = "2.0.21"/' android/build.gradle || true
          sed -i 's/kotlin_version = "[0-9.]*"/kotlin_version = "2.0.21"/' android/build.gradle || true
          sed -i 's/kotlinVersion=[0-9.]*/kotlinVersion=2.0.21/' android/gradle.properties || true
          echo "kotlinVersion=2.0.21" >> android/gradle.properties
          echo "=== gradle.properties after patch ==="
          cat android/gradle.properties

      - name: Patch Gradle wrapper to 8.10.2
        run: |
          sed -i 's|distributions/gradle-[0-9.]*-bin.zip|distributions/gradle-8.10.2-bin.zip|g' android/gradle/wrapper/gradle-wrapper.properties
          cat android/gradle/wrapper/gradle-wrapper.properties

      - name: Remove deprecated enableBundleCompression
        run: |
          sed -i '/enableBundleCompression/d' android/app/build.gradle
          echo "Patched app/build.gradle"

      - name: Fix hermesc after prebuild
        run: |
          echo "=== Re-fixing Hermes binary permissions after prebuild ==="
          find node_modules/react-native/sdks -type f -name "hermesc" | xargs chmod +x 2>/dev/null || true
          find node_modules/react-native/sdks -type f -name "*.sh" | xargs chmod +x 2>/dev/null || true

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Release APK
        working-directory: android
        run: |
          ./gradlew assembleRelease \
            --no-daemon \
            --warning-mode none \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m" \
            -Dorg.gradle.parallel=false
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn