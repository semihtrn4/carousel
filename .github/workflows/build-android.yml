name: Android APK Build

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Install Expo CLI globally
        run: npm install -g @expo/cli@latest

      # ── DIAGNOSTIC: prebuild'den önce ortamı kontrol et ──────────────────
      - name: Diagnose environment
        run: |
          echo "=== Node / npm ==="
          node --version
          npm --version

          echo "=== Expo CLI binary ==="
          EXPO_CLI=$(npm root -g)/@expo/cli/bin/cli
          ls -la "$EXPO_CLI" || echo "NOT FOUND: $EXPO_CLI"

          echo "=== app.json / app.config.js ==="
          ls -la app.json app.config.js app.config.ts 2>/dev/null || echo "No app config found!"
          cat app.json 2>/dev/null || true

          echo "=== package.json expo field ==="
          node -e "const p=require('./package.json'); console.log(JSON.stringify(p.expo,null,2))" 2>/dev/null || true

          echo "=== Disk space ==="
          df -h

      # ── PREBUILD (set -x ile tam log) ────────────────────────────────────
      - name: Expo Prebuild
        run: |
          set -x
          EXPO_CLI=$(npm root -g)/@expo/cli/bin/cli
          node "$EXPO_CLI" prebuild --platform android --clean --no-install 2>&1
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          EXPO_NO_DOTENV: "1"
          EXPO_NO_TELEMETRY: "1"

      - name: Patch Kotlin version to 2.0.21
        run: |
          sed -i 's/kotlinVersion = "[0-9.]*"/kotlinVersion = "2.0.21"/' android/build.gradle
          grep "kotlinVersion" android/build.gradle

      - name: Patch Gradle wrapper to 8.10.2
        run: |
          sed -i 's|gradle-[0-9.]*-bin.zip|gradle-8.10.2-bin.zip|g' android/gradle/wrapper/gradle-wrapper.properties
          cat android/gradle/wrapper/gradle-wrapper.properties

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Release APK
        working-directory: android
        run: |
          ./gradlew assembleRelease \
            --no-daemon \
            --stacktrace \
            --warning-mode all \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m" \
            -Dorg.gradle.parallel=false
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn